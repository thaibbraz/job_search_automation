name: Jobbyo Daily Run

on:
  schedule:
    # TEST: today July 1 at 16:35 CEST (14:35 UTC) — remove after first run
    - cron: "35 14 1 7 *"
    # PRODUCTION: every day at 00:00 CEST Barcelona (22:00 UTC previous day)
    - cron: "0 22 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  run:
    name: Run job search for all users
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openai

      - name: Run script
        run: python send_jobbyo.py

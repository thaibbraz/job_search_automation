name: Jobbyo Daily Run

on:
  schedule:
    # TEST: today July 1 at 16:35 CEST (14:35 UTC) — remove after first run
    - cron: "35 14 1 7 *"
    # PRODUCTION: every day at 00:00 CEST Barcelona (22:00 UTC previous day)
    - cron: "0 22 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  run:
    name: Run job search for all users
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openai

      - name: Run script
        env:
          OPENAI_API_KEY: "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"
          JOBBYO_APIFY_TOKEN: "apify_api_cjTqImkuLHu1ovfHcGRSrV6wff3A820x6tm6"
          JOBO_API_KEY: "jbe_live_QXds10kToWih1Hy5Z_3if_H7MEWgf3mr_GagtJwc3Gly29DZPH4knkJROm-0IBxcI"
        run: python send_jobbyo.py
